spring.application.name=TechSeller
# ConfigurańŃo do banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/TechSeller?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialeto do Hibernate para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Atualizar automaticamente o esquema do banco de dados
spring.jpa.hibernate.ddl-auto=update
