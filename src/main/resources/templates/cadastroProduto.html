<!doctype html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Cadastro de Produtos</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #212529;
        }
        .navbar a {
            color: #ffffff !important;
            margin-right: 15px;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #bbb;
            margin-top: 30px;
        }
        .form-label {
            font-weight: bold;
        }
        .btn-primary {
            background-color: #198754;
            border: none;
        }
        .btn-primary:hover {
            background-color: #146c43;
        }
        .btn-secondary {
            background-color: #6c757d;
            border: none;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">TechSeller</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/perfil">Meu Perfil</a></li>
                <li class="nav-item"><a class="nav-link" href="/usuarios">Gerenciar Usuários</a></li>
                <li class="nav-item"><a class="nav-link" href="/produtos">Gerenciar Produtos</a></li>
            </ul>
            <a class="nav-link text-danger" href="/logout">Sair</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="text-center text-dark">Cadastrar Produto</h2>
    <form th:action="@{/produtos/salvar}" method="post" th:object="${produto}" enctype="multipart/form-data">
        <input type="hidden" id="produtoId" th:value="${produto.produtoId}">
        <div class="mb-3">
            <label class="form-label">Nome do Produto:</label>
            <input type="text" class="form-control" th:field="*{nome}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Preço:</label>
            <input type="number" class="form-control" th:field="*{preco}" step="0.01" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Quantidade em Estoque:</label>
            <input type="number" class="form-control" th:field="*{quantidadeEstoque}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Descrição:</label>
            <textarea class="form-control" th:field="*{descricaoDetalhada}" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Avaliação (0.5-5.0):</label>
            <input type="number" class="form-control" th:field="*{avaliacao}" step="0.1" min="0.5" max="5.0">
        </div>

        <div class="mb-3">
            <label class="form-label">Imagem do Produto:</label>
            <input type="file" class="form-control" id="inputImagem" name="imagem" accept="image/*" required>


        <!-- Botão para abrir a modal -->
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#imagemModal">
            Visualizar Imagem
        </button>

        <!-- Modal -->
        <div class="modal fade" id="imagemModal" tabindex="-1" aria-labelledby="imagemModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="imagemModalLabel">Adicionar Imagem</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <button type="button" id="btnSelecionarImagem" class="btn btn-info">
                            Alterar imagem
                        </button>



                        <!-- Espaço para visualizar a imagem selecionada -->
                        <div id="previewContainer" class="mt-3" style="display: none;">
                            <img id="previewImagem" src="" alt="Prévia da Imagem" class="img-fluid rounded">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-3 d-flex justify-content-between">
            <button type="submit" class="btn btn-primary w-50">Adicionar Produto</button>
            <a href="/produtos" class="btn btn-secondary w-50">Cancelar</a>
        </div>
    </form>
</div>

<script>
    // Evento para abrir o explorador de arquivos ao clicar no botão "Selecionar Imagem"
    document.getElementById("btnSelecionarImagem").addEventListener("click", function () {
        document.getElementById("inputImagem").click(); // Abre o explorador de arquivos
    });

    // Exibir pré-visualização da imagem antes de salvar
    document.getElementById("inputImagem").addEventListener("change", function (event) {
        let file = event.target.files[0];

        if (file) {
            let reader = new FileReader();

            reader.onload = function (e) {
                document.getElementById("previewImagem").src = e.target.result;
                document.getElementById("previewContainer").style.display = "block";
            };

            reader.readAsDataURL(file);
        }
    });

    // Evento para salvar a imagem ao clicar em "Salvar"
    document.getElementById("btnSalvarImagem").addEventListener("click", function () {
        let inputImagem = document.getElementById("inputImagem");
        let file = inputImagem.files[0];

        if (!file) {
            alert("Por favor, selecione uma imagem antes de salvar!");
            return;
        }

        // Verifica se há um ID de produto definido no formulário
        let produtoIdElement = document.getElementById("produtoId");
        if (!produtoIdElement) {
            alert("Erro: ID do produto não encontrado!");
            return;
        }

        let produtoId = produtoIdElement.value; // Obtém o ID do produto

        let formData = new FormData();
        formData.append("imagem", file);

        // Enviar a imagem para o backend
        fetch(`/produtos/${produtoId}/imagem`, {
            method: "POST",
            body: formData
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error("Erro ao salvar a imagem");
                }
                return response.text();
            })
            .then(data => {
                alert("Imagem salva com sucesso!");
                document.getElementById("previewImagem").src = URL.createObjectURL(file); // Atualiza a visualização
                fecharModal(); // Chama a função para fechar a modal
            })
            .catch(error => {
                console.error("Erro ao salvar imagem:", error);
                alert("Erro ao salvar imagem. Tente novamente.");
            });
    });

    // Função para fechar a modal corretamente
    function fecharModal() {
        let modal = document.getElementById("imagemModal");

        let modalInstance = bootstrap.Modal.getInstance(modal);
        if (modalInstance) {
            modalInstance.hide();
        }
    }

</script>


</body>
</html>
