<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <title>Cadastro de Usuario</title>
</head>
<body>
<div class="container">
    <h1 style="color: red">Cadastro de Usuario</h1>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <p th:text="${errorMessage}"></p>
    </div>

    <form class="col-5" th:action="@{/registerUser}" th:object="${user}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label"><b>Nome: </b></label>
            <input type="text" th:field="*{username}" class="form-control" id="username" placeholder="Digite o nome">
        </div>

        <div class="mb-3">
            <label for="cpf" class="form-label"><b>CPF: </b></label>
            <input type="text" th:field="*{cpf}" class="form-control" id="cpf" placeholder="Ex: 123.456.789-09">
        </div>

        <div class="mb-3">
            <label for="email" class="form-label"><b>E-mail: </b></label>
            <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="Ex: usuario@example.com">
        </div>

        <div class="mb-3">
            <label for="password" class="form-label"><b>Senha: </b></label>
            <input type="password" th:field="*{password}" class="form-control" id="password" placeholder="">
        </div>

        <div class="mb-3">
            <label for="confPassword" class="form-label"><b>Confirme a senha: </b></label>
            <input type="password" th:field="*{confPassword}" class="form-control" id="confPassword" placeholder="">
        </div>


          <div class="mb-3">
              <label for="status" class="form-label" id="status"><b>Status:</b></label>

        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="status" id="cliente" value="Cliente">
            <label class="form-check-label" for="cliente">Cliente</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="status" id="vendedor" value="Vendedor">
            <label class="form-check-label" for="vendedor">Vendedor</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="status" id="administrador" value="Administrador">
            <label class="form-check-label" for="administrador">Administrador</label>
        </div>
          </div>
        <button type="submit" class="btn btn-success">Cadastrar</button>
    </form>

</div>

</body>
</html>
