<!doctype html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Listar Produtos</title>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand text-light fw-bold" href="#">TechSeller</a>
        <div class="ms-auto">

            <a href="#" class="btn btn-danger btn-sm">Sair</a>
        </div>
    </div>
</nav>

<!-- Conteúdo Principal -->
<div class="container mt-4">
    <!-- Cabeçalho -->
    <div class="d-flex justify-content-between align-items-center">
        <h4 class="fw-bold text-danger">Produtos</h4>
        <a th:href="@{/produtos/novo}" class="btn btn-success">+ Novo Produto</a>

    </div>

    <!-- Barra de Pesquisa -->
    <div class="mt-3 mb-3">
        <div class="input-group">
            <input type="text" class="form-control" placeholder="Pesquisar" />
            <button class="btn btn-danger">
                🔍
            </button>
        </div>
    </div>

    <!-- Tabela de Produtos -->
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead class="table-dark text-light">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Quantidade</th>
                <th>Valor</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="produto : ${produtos}">
                <td th:text="${produto.produtoId}"></td>
                <td th:text="${produto.nome}"></td>
                <td th:text="${produto.quantidadeEstoque}"></td>
                <td th:text="'R$ ' + ${produto.preco}"></td>
                <td>
                    <span th:class="${produto.ativo} ? 'text-success fw-bold' : 'text-danger fw-bold'"
                          th:text="${produto.ativo} ? 'Ativo' : 'Inativo'"></span>
                </td>
                <td>
                    <a th:href="@{/produtos/editar/{id}(id=${produto.produtoId})}" class="btn btn-success btn-sm">
                        ✏️ Editar
                    </a>
                    <a th:href="@{/produtos/{id}(id=${produto.produtoId})}" class="btn btn-primary btn-sm">
                        👁️ Visualizar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
