<!DOCTYPE html>
<html lang="pt" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        .btn-edit {
            background-color: green;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        .btn-back {
            margin-top: 20px;
            padding: 5px 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center text-danger">Usuários</h2>

    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Email</th>
            <th>Grupo</th>
            <th>Senha</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <!-- Linhas com valores nulos -->
        <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.nome} ?: '-'"></td>
            <td th:text="${usuario.cpf} ?: '-'"></td>
            <td th:text="${usuario.email} ?: '-'"></td>
            <td th:text="${usuario.grupo} ?: '-'"></td>
            <td th:text="${usuario.senha} ?: '-'"></td>
            <td th:text="${usuario.status} ?: '-'"></td>
            <td><button class="btn-edit">Editar</button></td>
        </tr>
        </tbody>
    </table>

    <div class="text-center">
        <a class="btn btn-outline-dark btn-back" th:href="@{/home}">Voltar</a>
    </div>
</div>

</body>
</html>
